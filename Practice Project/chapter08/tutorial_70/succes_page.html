<style>
    #toDoList {
        font-family: Arial, Helvetica, sans-serif;
        border-collapse: collapse;
        width: 100%;
    }

    #toDoList td,
    #toDoList th {
        border: 1px solid #ddd;
        padding: 8px;
    }

    #toDoList tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    #toDoList tr:hover {
        background-color: #ddd;
    }

    #toDoList th {
        padding-top: 12px;
        padding-bottom: 12px;
        text-align: left;
        background-color: #04AA6D;
        color: white;
    }
</style>

    </div>
    <br>
    <table id="toDoList">
        <thead>
            <th>Id</th>
            <th>Name</th>
            <th>Action</th>
        </thead>
